<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms and forms validation</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <form action="">
        <input required minlength="3" maxlength="20" type="text" placeholder="name">
        <input type="email" placeholder="email">
        <input type="passowrd" placeholder="password">
        <select name="" id="">
            <option value="male">male</option>
            <option value="female">female</option>
            <option value="others">others</option>
        </select>
        <textarea name="" id="" placeholder="tell us about yourself"></textarea>
        <input type="submit" value="">
    </form>
</body>
</html>
