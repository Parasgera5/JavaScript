<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <nav>
            <div class="left">Kanban</div>
            <div class="right"><button id="toggle-model">Add New Task</button></div>
        </nav>
        <section class="board">
            <div id="todo" class="task-column">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count</div>
                </div>
                <!-- <div draggable="true" class="task">
                    <h2>task 1</h2>
                    <p>description of task 1</p>
                    <button>delete</button>
                </div> -->
            </div>
            <div id="progress" class="task-column">
                <div class="heading">
                    <div class="left">In Progress</div>
                    <div class="right">Count</div>
                </div>

            </div>
            <div id="done" class="task-column">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">Count</div>
                </div>

            </div>
        </section>
    </main>
    <div class="model add-new-task">
        <div class="bg"></div>
        <div class="center">
            <input type="text" id="task-title-input" placeholder="Task Title">
            <textarea id="task-desc-input" placeholder="Task Description" name="textDes" id=""></textarea>
            <button id="add-new-task" class="add-task-button">Add Task</button>
        </div>
    </div>
</body>

</html>
