<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading Images with IntersectionObserver</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Lazy Loading Images with IntersectionObserver</h1>

    <div class="container">
        <p>Scroll down to see images load only when they enter the viewport 👇</p>

        <div class="spacer"></div>

        <img data-src="https://picsum.photos/id/1015/400/300" class="lazy-img" alt="Image 1">

        <div class="spacer"></div>

        <img data-src="https://picsum.photos/id/1025/400/300" class="lazy-img" alt="Image 2">

        <div class="spacer"></div>

        <img data-src="https://picsum.photos/id/1043/400/300" class="lazy-img" alt="Image 3">

        <div class="spacer"></div>

        <img data-src="https://picsum.photos/id/1062/400/300" class="lazy-img" alt="Image 4">
    </div>
</body>
</html>
